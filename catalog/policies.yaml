  - id: "policies.create_config_profile_assignment"
    aliases: ["policies.config_profile_assignment_create", "policies.add_config_profile_assignment"]
    rate_limit_class: "standard"
    summary: "Create a direct group assignment on a classic Intune configuration profile"
    description: >
      Creates a single assignment object under
      /deviceManagement/deviceConfigurations/{profile_id}/assignments using a
      groupAssignmentTarget. Prefer this when you need contained add/remove
      operations instead of building the full assign-action payload yourself.
    domain: "policies"
    safety_tier: "write"
    method: "POST"
    endpoint: "/deviceManagement/deviceConfigurations/{profile_id}/assignments"
    preview_lookup_endpoint: "/deviceManagement/deviceConfigurations/{profile_id}"
    preview_lookup_select: ["id", "displayName", "lastModifiedDateTime"]
    execute_fingerprint_fields: ["id", "displayName", "lastModifiedDateTime"]
    api_version: "v1.0"
    expected_success_status: 201
    graph_permissions:
      - "DeviceManagementConfiguration.ReadWrite.All"
    parameters:
      - name: "profile_id"
        type: "string"
        required: true
        description: "Classic configuration profile ID"
      - name: "group_id"
        type: "string"
        required: true
        description: "Target Entra group ID"
    body_template:
      "@odata.type": "#microsoft.graph.deviceConfigurationAssignment"
      target:
        "@odata.type": "microsoft.graph.groupAssignmentTarget"
        groupId: "{group_id}"
    tags: ["configuration", "profile", "assignment", "create", "intune", "classic"]
    cmmc_controls: ["CM.L2-3.4.2"]

