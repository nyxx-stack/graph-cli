operations:
  - id: "audit.directory_logs"
    aliases: ["audit.directory"]
    response_schema: "directoryAudit"
    rate_limit_class: "throttle_sensitive"
    summary: "Query Entra directory audit logs"
    description: >
      Returns audit log entries for directory operations (user, group, device,
      app changes). Supports date range and category filtering. 30-day
      retention on Entra P1/P2.
    domain: "audit_logs"
    safety_tier: "read"
    method: "GET"
    endpoint: "/auditLogs/directoryAudits"
    api_version: "v1.0"
    graph_permissions:
      - "AuditLog.Read.All"
    parameters:
      - name: "category"
        type: "string"
        required: false
        description: "Filter by audit category"
        enum:
          - "Device"
          - "UserManagement"
          - "GroupManagement"
          - "ApplicationManagement"
          - "RoleManagement"
          - "Policy"
        maps_to_filter: "category eq '{value}'"
    default_select:
      - "id"
      - "activityDisplayName"
      - "activityDateTime"
      - "category"
      - "loggedByService"
      - "correlationId"
      - "initiatedBy"
      - "targetResources"
      - "result"
      - "resultReason"
    default_orderby: "activityDateTime desc"
    tags: ["audit", "logs", "changes", "activity", "history", "trail"]
    cmmc_controls: ["AU.L2-3.3.1", "AU.L2-3.3.3"]
    examples:
      - description: "Device-related audit events"
        parameters: {"category": "Device"}
      - description: "User management changes"
        parameters: {"category": "UserManagement"}

  - id: "audit.sign_in_logs"
    aliases: ["audit.signins", "audit.sign_ins"]
    response_schema: "signIn"
    rate_limit_class: "throttle_sensitive"
    summary: "Query Entra sign-in logs"
    description: >
      Returns user sign-in activity including success/failure, MFA status,
      and conditional access evaluation. Limited to 30 days on P1/P2.
      Filtering on status/errorCode requires beta + ConsistencyLevel: eventual,
      so this op points at beta and sets advanced_query.
    domain: "audit_logs"
    safety_tier: "read"
    method: "GET"
    endpoint: "/auditLogs/signIns"
    api_version: "beta"
    advanced_query: true
    graph_permissions:
      - "AuditLog.Read.All"
    parameters:
      - name: "status_filter"
        type: "string"
        required: false
        description: "Filter by sign-in result. success → errorCode eq 0; failure → errorCode ne 0."
        enum: ["success", "failure"]
        value_map:
          success: "status/errorCode eq 0"
          failure: "status/errorCode ne 0"
      - name: "user_id"
        type: "string"
        required: false
        description: "Filter by user object ID (userId). Use for per-user drill-down."
        maps_to_filter: "userId eq '{value}'"
    default_select:
      - "id"
      - "userDisplayName"
      - "userPrincipalName"
      - "appDisplayName"
      - "ipAddress"
      - "clientAppUsed"
      - "status"
      - "conditionalAccessStatus"
      - "authenticationRequirement"
      - "createdDateTime"
    default_orderby: "createdDateTime desc"
    tags: ["sign-in", "login", "authentication", "failed", "mfa", "conditional access"]
    cmmc_controls: ["AU.L2-3.3.1", "AC.L2-3.1.8"]
