operations:
  - id: "groups.list_all"
    aliases: ["groups.list"]
    response_schema: "group"
    rate_limit_class: "standard"
    summary: "List Entra security groups"
    description: >
      Returns security groups in the tenant. Use name_contains to filter
      to DAF targeting groups (DAF - Corp-Win11, DAF - Users - CUI, etc).
    domain: "groups"
    safety_tier: "read"
    method: "GET"
    endpoint: "/groups"
    api_version: "v1.0"
    advanced_query: true
    graph_permissions:
      - "Group.Read.All"
    parameters:
      - name: "name_contains"
        type: "string"
        required: false
        description: "Filter group display name (startsWith)"
        maps_to_filter: "startswith(displayName, '{value}')"
      - name: "group_ids"
        type: "string"
        required: false
        description: "Comma-separated group object IDs to look up directly (skips full-list scan)"
        multi: true
        maps_to_filter: "id in ({value})"
    default_select:
      - "id"
      - "displayName"
      - "description"
      - "groupTypes"
      - "mailEnabled"
      - "securityEnabled"
      - "membershipRule"
      - "membershipRuleProcessingState"
    default_filter: "securityEnabled eq true"
    default_orderby: "displayName asc"
    tags: ["groups", "targeting", "assignment", "security group"]
    cmmc_controls: ["AC.L2-3.1.1"]
    examples:
      - description: "All DAF groups"
        parameters: {"name_contains": "DAF"}

  - id: "groups.list_members"
    aliases: ["groups.members"]
    response_schema: "directoryObject"
    rate_limit_class: "standard"
    summary: "List members of a specific group"
    description: >
      Returns user and device members of a group. Use to verify
      DAF targeting group membership is correct for policy assignments.
    domain: "groups"
    safety_tier: "read"
    method: "GET"
    endpoint: "/groups/{group_id}/members"
    api_version: "v1.0"
    graph_permissions:
      - "GroupMember.Read.All"
    parameters:
      - name: "group_id"
        type: "string"
        required: true
        description: "Entra group object ID"
    default_select:
      - "id"
      - "displayName"
      - "userPrincipalName"
    projections:
      - name: "kind"
        path: "@odata.type"
        enum_map:
          "#microsoft.graph.device": "device"
          "#microsoft.graph.user": "user"
          "#microsoft.graph.group": "group"
          "#microsoft.graph.servicePrincipal": "servicePrincipal"
    drop_paths: ["@odata.type"]
    tags: ["members", "membership", "group", "targeting"]
    cmmc_controls: ["AC.L2-3.1.1"]
    examples:
      - description: "Members of a specific group"
        parameters: {"group_id": "<group-object-id>"}

  - id: "groups.add_member"
    aliases: ["groups.member_add"]
    rate_limit_class: "standard"
    summary: "Add a user or device to a group"
    description: >
      Adds a directory object (user or device) as a member of the specified group.
      Use for updating Intune targeting group membership. Requires
      GroupMember.ReadWrite.All and Device.Read.All when adding devices.
    domain: "groups"
    safety_tier: "write"
    method: "POST"
    endpoint: "/groups/{group_id}/members/$ref"
    api_version: "v1.0"
    graph_permissions:
      - "GroupMember.ReadWrite.All"
      - "Device.Read.All"
    parameters:
      - name: "group_id"
        type: "string"
        required: true
        description: "Target group object ID"
      - name: "member_id"
        type: "string"
        required: true
        description: "User or device object ID to add"
    body_template:
      "@odata.id": "https://graph.microsoft.com/v1.0/directoryObjects/{member_id}"
    tags: ["add", "member", "group", "assignment"]
    cmmc_controls: ["AC.L2-3.1.1"]

  - id: "groups.remove_member"
    aliases: ["groups.member_remove"]
    rate_limit_class: "standard"
    summary: "Remove a user or device from a group"
    description: >
      Removes a directory object from a group using the required /$ref suffix.
      This operation never targets the non-/$ref variant.
    domain: "groups"
    safety_tier: "destructive"
    method: "DELETE"
    endpoint: "/groups/{group_id}/members/{member_id}/$ref"
    preview_lookup_endpoint: "/groups/{group_id}/members/{member_id}"
    preview_lookup_select: ["id", "displayName", "userPrincipalName"]
    execute_fingerprint_fields: ["id", "displayName", "userPrincipalName", "@odata.type"]
    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "GroupMember.ReadWrite.All"
    parameters:
      - name: "group_id"
        type: "string"
        required: true
        description: "Target group object ID"
      - name: "member_id"
        type: "string"
        required: true
        description: "Member object ID to remove"
    tags: ["remove", "member", "group", "assignment", "$ref"]
    cmmc_controls: ["AC.L2-3.1.5", "AC.L2-3.1.1"]

  - id: "groups.rename"
    aliases: ["groups.update_metadata", "groups.edit"]
    response_schema: "group"
    rate_limit_class: "standard"
    summary: "Rename a group or update its description"
    description: >
      PATCH a group's displayName and/or description. Supply at least one of
      display_name or description. Does not touch membership rules — use
      groups.update_rule for that.
    domain: "groups"
    safety_tier: "write"
    method: "PATCH"
    endpoint: "/groups/{group_id}"
    body_template:
      displayName: "{display_name}"
      description: "{description}"
    preview_lookup_endpoint: "/groups/{group_id}"
    preview_lookup_select: ["id", "displayName", "description"]
    execute_fingerprint_fields: ["id", "displayName", "description"]
    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "Group.ReadWrite.All"
    parameters:
      - name: "group_id"
        type: "string"
        required: true
        description: "Target group object ID"
      - name: "display_name"
        type: "string"
        required: false
        description: "New display name"
      - name: "description"
        type: "string"
        required: false
        description: "New description"
    tags: ["group", "rename", "description", "metadata", "patch"]
    cmmc_controls: ["AC.L2-3.1.1"]

  - id: "groups.update_rule"
    aliases: ["groups.rule_update", "groups.dynamic_rule"]
    response_schema: "group"
    rate_limit_class: "standard"
    summary: "Update a group's dynamic membership rule"
    description: >
      PATCH a group's membershipRule and membershipRuleProcessingState. Supply
      --body for more advanced group updates if needed.
    domain: "groups"
    safety_tier: "write"
    method: "PATCH"
    endpoint: "/groups/{group_id}"
    body_template:
      membershipRule: "{membership_rule}"
      membershipRuleProcessingState: "{membership_rule_processing_state}"
    preview_lookup_endpoint: "/groups/{group_id}"
    preview_lookup_select: ["id", "displayName", "membershipRule", "membershipRuleProcessingState"]
    execute_fingerprint_fields: ["id", "displayName", "membershipRule", "membershipRuleProcessingState"]
    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "Group.ReadWrite.All"
    parameters:
      - name: "group_id"
        type: "string"
        required: true
        description: "Target group object ID"
      - name: "membership_rule"
        type: "string"
        required: false
        description: "Dynamic membership rule string"
      - name: "membership_rule_processing_state"
        type: "string"
        required: false
        default: "On"
        description: "Processing state for the rule"
        enum: ["On", "Paused"]
    tags: ["group", "dynamic", "membership", "rule", "patch"]
    cmmc_controls: ["AC.L2-3.1.5", "AC.L2-3.1.1"]
