operations:
  - id: "devices.list_managed"
    aliases: ["devices.list"]
    response_schema: "managedDevice"
    rate_limit_class: "standard"
    summary: "List all Intune-managed devices"
    description: >
      Returns all devices enrolled in Intune MDM. Core fleet inventory query
      for compliance reporting, enrollment drift detection, and device lifecycle.
    domain: "devices"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/managedDevices"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementManagedDevices.Read.All"
    parameters:
      - name: "os_filter"
        type: "string"
        required: false
        description: "Filter by OS (e.g., 'Windows')"
        maps_to_filter: "operatingSystem eq '{value}'"
    default_select:
      - "id"
      - "deviceName"
      - "operatingSystem"
      - "osVersion"
      - "complianceState"
      - "lastSyncDateTime"
      - "enrolledDateTime"
      - "managementAgent"
      - "userPrincipalName"
    default_orderby: "deviceName asc"
    tags: ["inventory", "fleet", "enrollment", "mdm", "managed"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]
    examples:
      - description: "List all Windows devices"
        parameters: {"os_filter": "Windows"}
      - description: "List devices sorted by last sync"

  - id: "devices.list_stale"
    aliases: ["devices.stale"]
    response_schema: "managedDevice"
    rate_limit_class: "standard"
    summary: "List devices with no Intune check-in within N days"
    description: >
      Finds managed devices whose lastSyncDateTime is older than the specified
      threshold. Critical for enrollment drift detection and stale device cleanup.
    domain: "devices"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/managedDevices"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementManagedDevices.Read.All"
    parameters:
      - name: "days_inactive"
        type: "integer"
        required: true
        description: "Number of days since last sync to consider stale"
        default: 30
    default_select:
      - "id"
      - "deviceName"
      - "userPrincipalName"
      - "lastSyncDateTime"
      - "operatingSystem"
      - "osVersion"
      - "complianceState"
    default_orderby: "lastSyncDateTime asc"
    computed_filter: "lastSyncDateTime le {cutoff_datetime}"
    tags: ["stale", "inactive", "drift", "cleanup", "sync"]
    cmmc_controls: ["CM.L2-3.4.1"]
    examples:
      - description: "Devices not synced in 30 days"
        parameters: {"days_inactive": "30"}
      - description: "Devices not synced in 90 days"
        parameters: {"days_inactive": "90"}

  - id: "devices.compliance_status"
    aliases: ["devices.list_by_compliance", "devices.compliance"]
    response_schema: "managedDevice"
    rate_limit_class: "standard"
    summary: "List device compliance states (compliant, noncompliant, unknown)"
    description: >
      Returns compliance posture for managed devices. Filter by specific state
      to find noncompliant or unknown devices. Directly supports CMMC evidence.
    domain: "devices"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/managedDevices"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementManagedDevices.Read.All"
    parameters:
      - name: "state"
        type: "string"
        required: false
        description: "Filter by compliance state"
        enum: ["compliant", "noncompliant", "unknown", "notApplicable", "inGracePeriod", "error"]
        maps_to_filter: "complianceState eq '{value}'"
    default_select:
      - "id"
      - "deviceName"
      - "complianceState"
      - "lastSyncDateTime"
      - "operatingSystem"
      - "userPrincipalName"
    tags: ["compliance", "posture", "noncompliant", "health"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2", "CA.L2-3.12.1"]
    examples:
      - description: "All noncompliant devices"
        parameters: {"state": "noncompliant"}

  - id: "devices.configuration_states"
    aliases: ["devices.config_states", "devices.device_configuration_states"]
    rate_limit_class: "standard"
    summary: "List Intune configuration states reported by a managed device"
    description: >
      Returns per-profile configuration state rows for a specific managed device
      from /deviceManagement/managedDevices/{device_id}/deviceConfigurationStates.
      Use this to confirm whether a profile is still landing on a device after
      assignment changes or sync actions.
    domain: "devices"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/managedDevices/{device_id}/deviceConfigurationStates"
    api_version: "beta"
    beta: true
    graph_permissions:
      - "DeviceManagementManagedDevices.Read.All"
    parameters:
      - name: "device_id"
        type: "string"
        required: true
        description: "Intune managed device ID"
    default_select:
      - "id"
      - "displayName"
      - "state"
      - "platformType"
      - "version"
      - "settingCount"
      - "userPrincipalName"
    tags: ["configuration", "state", "device", "policy", "intune", "troubleshooting"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]

  - id: "devices.sync_device"
    aliases: ["devices.sync"]
    rate_limit_class: "standard"
    summary: "Trigger Intune sync on a specific managed device"
    description: >
      Sends a sync request to a managed device so it checks in with Intune
      and receives the latest policies. Non-destructive write operation.
      Requires PrivilegedOperations.All permission.
    domain: "devices"
    safety_tier: "write"
    method: "POST"
    endpoint: "/deviceManagement/managedDevices/{device_id}/syncDevice"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementManagedDevices.PrivilegedOperations.All"
    parameters:
      - name: "device_id"
        type: "string"
        required: true
        description: "Intune managed device ID"
    preview_lookup_endpoint: "/deviceManagement/managedDevices/{device_id}"
    preview_lookup_select: ["id", "deviceName", "userPrincipalName", "lastSyncDateTime"]
    execute_fingerprint_fields: ["id", "deviceName", "userPrincipalName", "lastSyncDateTime"]
    expected_success_status: 204
    tags: ["sync", "checkin", "policy", "refresh"]
    cmmc_controls: ["CM.L2-3.4.2"]

  - id: "devices.retire"
    aliases: ["devices.retire_device"]
    rate_limit_class: "standard"
    summary: "Retire an Intune-managed device"
    description: >
      Calls the retire action for a managed device. This removes corporate data
      and unenrolls the device per Intune platform behavior.
    domain: "devices"
    safety_tier: "destructive"
    method: "POST"
    endpoint: "/deviceManagement/managedDevices/{device_id}/retire"
    preview_lookup_endpoint: "/deviceManagement/managedDevices/{device_id}"
    preview_lookup_select: ["id", "deviceName", "userPrincipalName", "lastSyncDateTime"]
    execute_fingerprint_fields: ["id", "deviceName", "userPrincipalName", "lastSyncDateTime"]
    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "DeviceManagementManagedDevices.PrivilegedOperations.All"
    parameters:
      - name: "device_id"
        type: "string"
        required: true
        description: "Intune managed device ID"
    tags: ["device", "retire", "intune", "lifecycle"]
    cmmc_controls: ["MP.L2-3.8.3"]

  - id: "devices.wipe"
    aliases: ["devices.wipe_device"]
    rate_limit_class: "standard"
    summary: "Wipe an Intune-managed device"
    description: >
      Calls the wipe action for a managed device. Provide --body when you need
      non-default wipe options such as keeping user or enrollment data.
    domain: "devices"
    safety_tier: "destructive"
    method: "POST"
    endpoint: "/deviceManagement/managedDevices/{device_id}/wipe"
    preview_lookup_endpoint: "/deviceManagement/managedDevices/{device_id}"
    preview_lookup_select: ["id", "deviceName", "userPrincipalName", "lastSyncDateTime"]
    execute_fingerprint_fields: ["id", "deviceName", "userPrincipalName", "lastSyncDateTime"]
    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "DeviceManagementManagedDevices.PrivilegedOperations.All"
    parameters:
      - name: "device_id"
        type: "string"
        required: true
        description: "Intune managed device ID"
    tags: ["device", "wipe", "intune", "lifecycle"]
    cmmc_controls: ["MP.L2-3.8.3"]

  - id: "devices.delete_managed_device"
    aliases: ["devices.delete_intune_device"]
    rate_limit_class: "standard"
    summary: "Delete an Intune-managed device record"
    description: >
      DELETE a managedDevice object from Intune.
    domain: "devices"
    safety_tier: "destructive"
    method: "DELETE"
    endpoint: "/deviceManagement/managedDevices/{device_id}"
    preview_lookup_endpoint: "/deviceManagement/managedDevices/{device_id}"
    preview_lookup_select: ["id", "deviceName", "userPrincipalName", "lastSyncDateTime"]
    execute_fingerprint_fields: ["id", "deviceName", "userPrincipalName", "lastSyncDateTime"]
    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "DeviceManagementManagedDevices.ReadWrite.All"
    parameters:
      - name: "device_id"
        type: "string"
        required: true
        description: "Intune managed device ID"
    tags: ["device", "delete", "intune", "managed"]
    cmmc_controls: ["MP.L2-3.8.3"]

  - id: "devices.delete_entra_device"
    aliases: ["devices.delete_directory_device"]
    rate_limit_class: "standard"
    summary: "Delete an Entra registered device"
    description: >
      DELETE a device object from /devices/{device_id}. This is the primitive
      for stale Entra-only registration cleanup.
    domain: "devices"
    safety_tier: "destructive"
    method: "DELETE"
    endpoint: "/devices/{device_id}"
    preview_lookup_endpoint: "/devices/{device_id}"
    preview_lookup_select: ["id", "displayName", "deviceId", "approximateLastSignInDateTime"]
    execute_fingerprint_fields: ["id", "displayName", "deviceId", "approximateLastSignInDateTime"]
    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "Directory.AccessAsUser.All"
    parameters:
      - name: "device_id"
        type: "string"
        required: true
        description: "Entra device object ID"
    tags: ["device", "delete", "entra", "directory", "stale"]
    cmmc_controls: ["MP.L2-3.8.3"]
