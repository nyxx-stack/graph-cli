    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "DeviceManagementConfiguration.ReadWrite.All"
    parameters:
      - name: "policy_id"
        type: "string"
        required: true
        description: "Classic compliance policy ID"
    tags: ["compliance", "policy", "delete", "intune", "classic"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2", "IA.L2-3.5.7"]

  - id: "policies.assign_compliance_policy"
