operations:
  - id: "policies.list_config_profiles"
    aliases: ["policies.config_profiles"]
    response_schema: "deviceConfiguration"
    rate_limit_class: "standard"
    summary: "List Intune classic device configuration profiles"
    description: >
      Returns legacy (pre-Settings Catalog) configuration profiles from
      /deviceManagement/deviceConfigurations. For modern Settings Catalog
      profiles (most new Windows policies), use policies.list_settings_catalog.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/deviceConfigurations"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    default_select:
      - "id"
      - "displayName"
      - "description"
      - "lastModifiedDateTime"
      - "createdDateTime"
    default_orderby: "displayName asc"
    tags: ["profiles", "configuration", "policies", "intune", "settings", "classic"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]

  - id: "policies.list_settings_catalog"
    aliases: ["policies.settings_catalog", "policies.configuration_policies"]
    response_schema: "deviceConfiguration"
    rate_limit_class: "standard"
    summary: "List Intune Settings Catalog configuration policies"
    description: >
      Returns modern Settings Catalog policies from
      /deviceManagement/configurationPolicies. These are the
      post-2021 unified profiles most new Windows/macOS work uses.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/configurationPolicies"
    api_version: "beta"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    default_select:
      - "id"
      - "name"
      - "description"
      - "platforms"
      - "technologies"
      - "lastModifiedDateTime"
      - "createdDateTime"
    tags: ["profiles", "configuration", "policies", "intune", "settings-catalog", "modern"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]

  - id: "policies.list_modern_compliance"
    aliases: ["policies.compliance_modern", "policies.unified_compliance"]
    response_schema: "deviceCompliancePolicy"
    rate_limit_class: "standard"
    summary: "List Intune unified/Settings Catalog compliance policies"
    description: >
      Returns modern compliance policies from /deviceManagement/compliancePolicies
      (Settings Catalog era, post-2023). The classic per-platform policies are
      at policies.list_compliance_policies.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/compliancePolicies"
    api_version: "beta"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    default_select:
      - "id"
      - "name"
      - "description"
      - "platforms"
      - "technologies"
      - "lastModifiedDateTime"
      - "createdDateTime"
    tags: ["compliance", "policy", "intune", "settings-catalog", "modern"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]

  - id: "policies.profile_assignments"
    aliases: ["policies.assignments"]
    rate_limit_class: "standard"
    summary: "List group assignments for a classic configuration profile"
    description: >
      Shows which groups a classic (deviceConfigurations) profile is assigned to.
      For Settings Catalog policies, use policies.settings_catalog_assignments.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/deviceConfigurations/{profile_id}/assignments"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "profile_id"
        type: "string"
        required: true
        description: "Configuration profile ID"
    tags: ["assignments", "targeting", "groups", "profile", "classic"]
    cmmc_controls: ["CM.L2-3.4.2"]

  - id: "policies.settings_catalog_assignments"
    aliases: ["policies.sc_assignments", "policies.configuration_policy_assignments"]
    rate_limit_class: "standard"
    summary: "List group assignments for a Settings Catalog policy"
    description: >
      Shows group assignments for a modern Settings Catalog configuration policy.
      Uses /deviceManagement/configurationPolicies/{id}/assignments endpoint.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/configurationPolicies/{policy_id}/assignments"
    api_version: "beta"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "policy_id"
        type: "string"
        required: true
        description: "Settings Catalog policy ID (from policies.list_settings_catalog)"
    tags: ["assignments", "targeting", "groups", "settings-catalog", "modern"]
    cmmc_controls: ["CM.L2-3.4.2"]

  - id: "policies.profile_device_status"
    aliases: ["policies.profile_rollout"]
    rate_limit_class: "standard"
    summary: "List per-device deployment status for a configuration profile"
    description: >
      Shows Succeeded/Failed/Pending/Error status per device for a specific
      profile. Essential for rollout tracking.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/deviceConfigurations/{profile_id}/deviceStatuses"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "profile_id"
        type: "string"
        required: true
        description: "Configuration profile ID"
    default_select:
      - "id"
      - "deviceDisplayName"
      - "status"
      - "lastReportedDateTime"
      - "userPrincipalName"
    tags: ["deployment", "status", "rollout", "succeeded", "failed", "pending"]
    cmmc_controls: ["CM.L2-3.4.2"]
    examples:
      - description: "Status of a specific profile"
        parameters: {"profile_id": "<profile-id>"}

  - id: "policies.settings_catalog_device_status"
    aliases: ["policies.sc_device_status", "policies.sc_rollout"]
    rate_limit_class: "standard"
    summary: "List per-device deployment status for a Settings Catalog policy"
    description: >
      Uses the Intune reports POST endpoint getConfigurationPolicyNonComplianceReport
      to return per-device PolicyStatus for a Settings Catalog / configurationPolicies
      profile. PolicyStatus values: 0=Unknown, 1=NotApplicable, 2=Compliant,
      3=Remediated, 4=NonCompliant, 5=Error, 6=Conflict. The response {Schema,Values}
      is normalized to a list of row dicts by the executor's POST-read path.
    domain: "policies"
    safety_tier: "read"
    method: "POST"
    endpoint: "/deviceManagement/reports/getConfigurationPolicyNonComplianceReport"
    api_version: "beta"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "policy_id"
        type: "string"
        required: true
        description: "Settings Catalog policy ID (from policies.list_settings_catalog)"
    body_template:
      select:
        - "IntuneDeviceId"
        - "DeviceName"
        - "UPN"
        - "PolicyStatus"
        - "PolicyName"
        - "Manufacturer"
        - "Model"
      filter: "(PolicyId eq '{policy_id}')"
      skip: 0
      top: 500
    tags: ["deployment", "status", "rollout", "settings-catalog", "modern", "succeeded", "failed", "error", "conflict", "reports"]
    cmmc_controls: ["CM.L2-3.4.2"]
    examples:
      - description: "Per-device status for a Settings Catalog policy"
        parameters: {"policy_id": "<policy-id>"}

  - id: "policies.profile_settings"
    aliases: ["policies.profile_detail"]
    response_schema: "deviceConfiguration"
    rate_limit_class: "standard"
    summary: "Read setting details for a device configuration profile"
    description: >
      Returns the full configuration profile object including all settings.
      Needed for CMMC evidence to show exactly what settings are configured
      (e.g., session lock timeout, BitLocker settings, password requirements).
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/deviceConfigurations/{profile_id}"
    api_version: "v1.0"
    singleton: true
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "profile_id"
        type: "string"
        required: true
        description: "Configuration profile ID"
    tags: ["settings", "details", "evidence", "configuration"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2", "AC.L2-3.1.10"]

  - id: "policies.settings_catalog_settings"
    aliases: ["policies.sc_settings", "policies.configuration_policy_settings"]
    response_schema: "deviceConfiguration"
    rate_limit_class: "standard"
    summary: "Read setting details for a Settings Catalog policy"
    description: >
      Returns the setting instances for a modern Settings Catalog configuration
      policy from /deviceManagement/configurationPolicies/{policy_id}/settings.
      Use this to inspect specific Device Control, App Control, SmartScreen,
      or other modern policy settings when assignment alone is not enough.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/configurationPolicies/{policy_id}/settings"
    api_version: "beta"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "policy_id"
        type: "string"
        required: true
        description: "Settings Catalog policy ID"
    tags: ["settings", "details", "evidence", "configuration", "settings-catalog"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]

  - id: "policies.list_compliance_policies"
    aliases: ["policies.compliance_policies"]
    response_schema: "deviceCompliancePolicy"
    rate_limit_class: "standard"
    summary: "List Intune device compliance policies"
    description: >
      Returns all compliance policies configured in the tenant.
      Shows enforcement rules like password length, encryption requirements.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/deviceCompliancePolicies"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    default_select:
      - "id"
      - "displayName"
      - "description"
      - "lastModifiedDateTime"
      - "createdDateTime"
    default_orderby: "displayName asc"
    tags: ["compliance", "policy", "enforcement", "password", "encryption"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]

  - id: "policies.compliance_policy_settings"
    aliases: ["policies.compliance_settings"]
    response_schema: "deviceCompliancePolicy"
    rate_limit_class: "standard"
    summary: "Read compliance policy settings (password length, encryption, etc.)"
    description: >
      Returns the full compliance policy object including all configured settings.
      Use to verify password requirements, encryption enforcement, and other
      compliance rules match CMMC requirements.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/deviceCompliancePolicies/{policy_id}"
    api_version: "v1.0"
    singleton: true
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "policy_id"
        type: "string"
        required: true
        description: "Compliance policy ID"
    tags: ["compliance", "settings", "password", "encryption", "evidence"]
    cmmc_controls: ["CM.L2-3.4.1", "IA.L2-3.5.7"]

  - id: "policies.compliance_policy_device_statuses"
    aliases: ["policies.compliance_device_status"]
    rate_limit_class: "standard"
    summary: "List per-device compliance evaluation status for a compliance policy"
    description: >
      Returns per-device status for a specific compliance policy, showing which
      devices passed/failed and the status detail message explaining the failure.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/deviceCompliancePolicies/{policy_id}/deviceStatuses"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "policy_id"
        type: "string"
        required: true
        description: "Classic compliance policy ID"
    default_select:
      - "id"
      - "deviceDisplayName"
      - "status"
      - "lastReportedDateTime"
      - "userPrincipalName"
      - "complianceGracePeriodExpirationDateTime"
    tags: ["compliance", "device", "status", "evaluation", "rollout"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]

  - id: "policies.compliance_policy_setting_states"
    aliases: ["policies.compliance_setting_states"]
    rate_limit_class: "standard"
    summary: "List per-setting compliance states for a specific device under a compliance policy"
    description: >
      Returns the individual setting states for a device under a compliance
      policy device status. Shows which specific settings (Secure Boot, Code
      Integrity, etc.) passed or failed.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/deviceCompliancePolicies/{policy_id}/deviceStatuses/{status_id}/settingStates"
    api_version: "v1.0"
    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "policy_id"
        type: "string"
        required: true
        description: "Classic compliance policy ID"
      - name: "status_id"
        type: "string"
        required: true
        description: "Device status ID from compliance_policy_device_statuses"
    tags: ["compliance", "settings", "device", "evaluation", "detail"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2"]

  - id: "policies.list_security_baselines"
    aliases: ["policies.security_baselines"]
    rate_limit_class: "standard"
    summary: "List security baseline profiles (BETA)"
    description: >
      Returns endpoint security baseline profiles. Note: this uses the /beta
      API and the deviceManagement/templates endpoint which may change.
      Requires DeviceManagementSecurity.Read.All or DeviceManagementConfiguration.Read.All.
    domain: "policies"
    safety_tier: "read"
    method: "GET"
    endpoint: "/deviceManagement/templates"
    api_version: "beta"

    graph_permissions:
      - "DeviceManagementConfiguration.Read.All"
    parameters:
      - name: "template_type"
        type: "string"
        required: false
        description: "Filter by template type"
        maps_to_filter: "templateType eq '{value}'"
    default_select:
      - "id"
      - "displayName"
      - "description"
      - "templateType"
      - "publishedDateTime"
    tags: ["baseline", "security", "template", "endpoint security"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2", "SC.L2-3.13.1"]

  - id: "policies.create_compliance_policy"
    aliases: ["policies.compliance_create"]
    response_schema: "deviceCompliancePolicy"
    rate_limit_class: "standard"
    summary: "Create a classic Intune device compliance policy"
    description: >
      Creates a policy on /deviceManagement/deviceCompliancePolicies. Supply the
      full derived-policy JSON body (for example a windows10CompliancePolicy).
      Classic Windows compliance creates also need scheduledActionsForRule in
      the request body; in practice Graph expects the default ruleName
      PasswordRequired even when the real policy focus is device-health
      attestation such as Secure Boot or Code Integrity.
    domain: "policies"
    safety_tier: "write"
    method: "POST"
    endpoint: "/deviceManagement/deviceCompliancePolicies"
    preview_lookup_endpoint: "/deviceManagement/deviceCompliancePolicies"
    api_version: "v1.0"
    expected_success_status: 201
    graph_permissions:
      - "DeviceManagementConfiguration.ReadWrite.All"
    tags: ["compliance", "policy", "create", "intune", "classic"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2", "IA.L2-3.5.7"]

  - id: "policies.update_compliance_policy"
    aliases: ["policies.compliance_update"]
    response_schema: "deviceCompliancePolicy"
    rate_limit_class: "standard"
    summary: "Update a classic Intune device compliance policy"
    description: >
      PATCH a policy on /deviceManagement/deviceCompliancePolicies/{policy_id}.
      Supply only the properties being changed.
    domain: "policies"
    safety_tier: "write"
    method: "PATCH"
    endpoint: "/deviceManagement/deviceCompliancePolicies/{policy_id}"
    preview_lookup_endpoint: "/deviceManagement/deviceCompliancePolicies/{policy_id}"
    preview_lookup_select: ["id", "displayName", "lastModifiedDateTime"]
    execute_fingerprint_fields: ["id", "displayName", "lastModifiedDateTime"]
    api_version: "v1.0"
    expected_success_status: 204
    graph_permissions:
      - "DeviceManagementConfiguration.ReadWrite.All"
    parameters:
      - name: "policy_id"
        type: "string"
        required: true
        description: "Classic compliance policy ID"
    tags: ["compliance", "policy", "update", "intune", "classic"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2", "IA.L2-3.5.7"]

  - id: "policies.delete_compliance_policy"
    aliases: ["policies.compliance_delete"]
    rate_limit_class: "standard"
    summary: "Delete a classic Intune device compliance policy"
    description: >
      DELETE a policy from /deviceManagement/deviceCompliancePolicies/{policy_id}.
