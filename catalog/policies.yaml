  - id: "policies.delete_compliance_policy"
    aliases: ["policies.compliance_delete"]
    rate_limit_class: "standard"
    summary: "Delete a classic Intune device compliance policy"
    description: >
      DELETE a policy from /deviceManagement/deviceCompliancePolicies/{policy_id}.
