        required: true
        description: "Classic compliance policy ID"
    tags: ["compliance", "policy", "delete", "intune", "classic"]
    cmmc_controls: ["CM.L2-3.4.1", "CM.L2-3.4.2", "IA.L2-3.5.7"]

