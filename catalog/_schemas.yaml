managedDevice:
  description: "Intune-managed device"
  properties:
    id: {type: "string", description: "Device ID"}
    deviceName: {type: "string", description: "Device name"}
    operatingSystem: {type: "string", description: "OS type (Windows, iOS, etc.)"}
    osVersion: {type: "string", description: "OS version string"}
    complianceState: {type: "string", description: "compliant, noncompliant, unknown, etc."}
    lastSyncDateTime: {type: "dateTimeOffset", description: "Last Intune check-in time"}
    enrolledDateTime: {type: "dateTimeOffset", description: "Enrollment date"}
    managementAgent: {type: "string", description: "Management channel (mdm, eas, etc.)"}
    userPrincipalName: {type: "string", description: "Primary user UPN"}
    deviceEnrollmentType: {type: "string", description: "How the device was enrolled"}
    isEncrypted: {type: "boolean", description: "Whether device storage is encrypted"}
    model: {type: "string", description: "Device model"}
    manufacturer: {type: "string", description: "Device manufacturer"}
    serialNumber: {type: "string", description: "Device serial number"}
    totalStorageSpaceInBytes: {type: "int64", description: "Total storage"}
    freeStorageSpaceInBytes: {type: "int64", description: "Free storage"}
  relationships:
    deviceCompliancePolicyStates: {type: "collection", target: "deviceCompliancePolicyState"}
    deviceConfigurationStates: {type: "collection", target: "deviceConfigurationState"}

user:
  description: "Entra ID user"
  properties:
    id: {type: "string", description: "User object ID"}
    displayName: {type: "string", description: "Display name"}
    userPrincipalName: {type: "string", description: "UPN (email format)"}
    accountEnabled: {type: "boolean", description: "Whether account is active"}
    userType: {type: "string", description: "Member or Guest"}
    createdDateTime: {type: "dateTimeOffset", description: "Account creation date"}
    jobTitle: {type: "string", description: "Job title"}
    department: {type: "string", description: "Department"}
    officeLocation: {type: "string", description: "Office location"}
  relationships:
    memberOf: {type: "collection", target: "directoryObject"}
    directReports: {type: "collection", target: "directoryObject"}

group:
  description: "Entra ID security group"
  properties:
    id: {type: "string", description: "Group object ID"}
    displayName: {type: "string", description: "Group display name"}
    description: {type: "string", description: "Group description"}
    groupTypes: {type: "collection(string)", description: "Group type indicators"}
    securityEnabled: {type: "boolean", description: "Whether this is a security group"}
    membershipRule: {type: "string", description: "Dynamic membership rule (if dynamic)"}
    membershipRuleProcessingState: {type: "string", description: "On or Paused"}
    createdDateTime: {type: "dateTimeOffset", description: "Group creation date"}
  relationships:
    members: {type: "collection", target: "directoryObject"}
    owners: {type: "collection", target: "directoryObject"}

device:
  description: "Entra directory device object"
  properties:
    id: {type: "string", description: "Directory object ID"}
    deviceId: {type: "string", description: "Alternate device identifier"}
    displayName: {type: "string", description: "Device display name"}
    accountEnabled: {type: "boolean", description: "Whether the device object is enabled"}
    approximateLastSignInDateTime: {type: "dateTimeOffset", description: "Approximate last sign-in time"}
    isCompliant: {type: "boolean", description: "Compliance state from Entra perspective (null if no policy evaluated)"}
    isManaged: {type: "boolean", description: "Whether managed by MDM"}
    managementType: {type: "string", description: "Management type (empty, MDM, etc.)"}
    operatingSystem: {type: "string", description: "OS type (Windows, macOS, etc.)"}
    operatingSystemVersion: {type: "string", description: "OS version string"}
    profileType: {type: "string", description: "RegisteredDevice, SecureVM, Printer, etc."}
    registrationDateTime: {type: "dateTimeOffset", description: "When the device was registered"}
    trustType: {type: "string", description: "AzureAd (Entra joined), ServerAd (hybrid), Workplace (registered)"}
    deviceOwnership: {type: "string", description: "Company, Personal, Unknown"}

deviceCompliancePolicy:
  description: "Intune compliance policy"
  properties:
    id: {type: "string", description: "Policy ID"}
    displayName: {type: "string", description: "Policy name"}
    description: {type: "string", description: "Policy description"}
    createdDateTime: {type: "dateTimeOffset", description: "Created date"}
    lastModifiedDateTime: {type: "dateTimeOffset", description: "Last modified date"}
    version: {type: "int32", description: "Policy version"}

deviceConfiguration:
  description: "Intune device configuration profile"
  properties:
    id: {type: "string", description: "Profile ID"}
    displayName: {type: "string", description: "Profile name"}
    description: {type: "string", description: "Profile description"}
    createdDateTime: {type: "dateTimeOffset", description: "Created date"}
    lastModifiedDateTime: {type: "dateTimeOffset", description: "Last modified date"}
    version: {type: "int32", description: "Profile version"}
  relationships:
    assignments: {type: "collection", target: "deviceConfigurationAssignment"}
    deviceStatuses: {type: "collection", target: "deviceConfigurationDeviceStatus"}

deviceManagementIntent:
  description: "Intune baseline intent profile"
  properties:
    id: {type: "string", description: "Intent ID"}
    displayName: {type: "string", description: "Intent display name"}
    description: {type: "string", description: "Intent description"}
    templateId: {type: "string", description: "Backing template ID"}
    isAssigned: {type: "boolean", description: "Whether the intent has assignments"}
    lastModifiedDateTime: {type: "dateTimeOffset", description: "Last modified time"}

conditionalAccessPolicy:
  description: "Entra Conditional Access policy"
  properties:
    id: {type: "string", description: "Policy ID"}
    displayName: {type: "string", description: "Policy name"}
    state: {type: "string", description: "enabled, disabled, or enabledForReportingButNotEnforced"}
    conditions: {type: "conditionalAccessConditionSet", description: "Policy conditions"}
    grantControls: {type: "conditionalAccessGrantControls", description: "Grant controls (MFA, compliant device, etc.)"}
    sessionControls: {type: "conditionalAccessSessionControls", description: "Session controls"}
    createdDateTime: {type: "dateTimeOffset", description: "Created date"}
    modifiedDateTime: {type: "dateTimeOffset", description: "Last modified date"}

directoryObject:
  description: "Base Entra directory object (user, group, device, service principal, etc.)"
  properties:
    id: {type: "string", description: "Object ID"}
    "@odata.type": {type: "string", description: "Concrete type — #microsoft.graph.user, .group, .device, etc."}
    displayName: {type: "string", description: "Display name if the concrete type exposes one"}
    userPrincipalName: {type: "string", description: "UPN (present on user-typed members)"}

directoryRole:
  description: "Activated Entra directory role (member-of enumeration)"
  properties:
    id: {type: "string", description: "Role instance ID"}
    displayName: {type: "string", description: "Role name (e.g. Global Administrator)"}
    description: {type: "string", description: "Role description"}
    roleTemplateId: {type: "string", description: "Stable role template GUID"}
  relationships:
    members: {type: "collection", target: "directoryObject"}

signIn:
  description: "Entra sign-in log entry (Entra P1/P2, 30-day retention)"
  properties:
    id: {type: "string", description: "Sign-in ID"}
    createdDateTime: {type: "dateTimeOffset", description: "When the sign-in happened"}
    userDisplayName: {type: "string", description: "User display name"}
    userPrincipalName: {type: "string", description: "User UPN"}
    appDisplayName: {type: "string", description: "Application the user signed in to"}
    conditionalAccessStatus: {type: "string", description: "success | failure | notApplied"}
    status: {type: "signInStatus", description: "errorCode, failureReason"}
    ipAddress: {type: "string", description: "Client IP"}
    clientAppUsed: {type: "string", description: "Client app category"}

directoryAudit:
  description: "Entra directory audit event"
  properties:
    id: {type: "string", description: "Event ID"}
    activityDateTime: {type: "dateTimeOffset", description: "When the activity occurred"}
    activityDisplayName: {type: "string", description: "Activity name"}
    category: {type: "string", description: "e.g. Device, UserManagement, Policy"}
    result: {type: "string", description: "success | failure"}
    initiatedBy: {type: "auditActivityInitiator", description: "User or app that initiated"}
    targetResources: {type: "collection", description: "Resources affected by the event"}

userRegistrationDetails:
  description: "Per-user authentication method registration status (MFA posture)"
  properties:
    id: {type: "string", description: "User ID"}
    userPrincipalName: {type: "string", description: "User UPN"}
    userDisplayName: {type: "string", description: "User display name"}
    isMfaRegistered: {type: "boolean", description: "User has registered any MFA method"}
    isMfaCapable: {type: "boolean", description: "Tenant grants user access to MFA"}
    methodsRegistered: {type: "collection(string)", description: "Registered method identifiers"}
