name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .[dev]
      - name: CLI help
        run: graphconnect --help
      - name: Module help
        run: python -m graphconnect --help
      - name: Doctor JSON
        run: graphconnect doctor --format json
      - name: Tests
        run: python -m pytest -q
